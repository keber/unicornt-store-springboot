# Datasource — variables de entorno requeridas en el servidor
# MySQL (default):
#   UNICORNT_MYSQL_URL      jdbc:mysql://host:3306/unicornt_store?useSSL=false&serverTimezone=America/Santiago&characterEncoding=UTF-8&useUnicode=true
#   UNICORNT_MYSQL_ADM_USER     <usuario>
#   UNICORNT_MYSQL_ADM_PASSWORD <contraseña>
#spring.datasource.url=${SPRING_DATASOURCE_URL}  # El valor de esta propiedad es establecido por el servidor a través de la variable de entorno homónima. En desarrollo, se puede usar un valor por defecto apuntando a una base de datos local.
#spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
#spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — ddl-auto=update crea las tablas users, roles, users_roles automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=false

# Spring Boot
spring.application.name=unicornt-store-admin
