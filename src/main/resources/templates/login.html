<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión &mdash; Unicorn't Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unicornt-store.keber.cl/assets/css/main.css">
    <link rel="stylesheet" th:href="@{/assets/css/admin.css}">
</head>

<body class="d-flex align-items-center" style="min-height:100vh; background-color:#faf9ff;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-5 col-lg-4">

            <!-- Branding -->
            <div class="text-center mb-4">
                <img th:src="@{/assets/img/unicornt-logo.png}" alt="Unicorn't Store"
                     style="height:80px;" class="mb-2">
                <h3 class="fw-bold mt-2" style="color:var(--text-dark)">Unicorn't Store</h3>
                <p class="text-muted small">Inicia sesión para continuar</p>
            </div>

            <!-- Card -->
            <div class="admin-form-card p-4">

                <!-- Alertas -->
                <div th:if="${param.error}" class="alert alert-danger py-2 small" role="alert">
                    <i class="fa-solid fa-circle-exclamation me-1"></i>Credenciales incorrectas.
                </div>
                <div th:if="${param.logout}" class="alert alert-info py-2 small" role="alert">
                    <i class="fa-solid fa-circle-check me-1"></i>Sesión cerrada correctamente.
                </div>
                <div th:if="${param.registered}" class="alert alert-success py-2 small" role="alert">
                    <i class="fa-solid fa-circle-check me-1"></i>Cuenta creada. Ya puedes iniciar sesión.
                </div>

                <!-- Form -->
                <form th:action="@{/login}" method="post">

                    <div class="mb-3">
                        <label for="username" class="form-label small fw-semibold">Correo electrónico</label>
                        <input type="email" id="username" name="username"
                               class="form-control" placeholder="tu@correo.com" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label small fw-semibold">Contraseña</label>
                        <input type="password" id="password" name="password"
                               class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-semibold">
                        <i class="fa-solid fa-right-to-bracket me-1"></i>Ingresar
                    </button>
                </form>

                <hr class="my-3">

                <p class="text-center small mb-0">
                    ¿No tienes cuenta?
                    <a th:href="@{/register}" class="fw-semibold">Crear cuenta</a>
                </p>
            </div>

            <!-- Demo credentials -->
            <div class="mt-3 p-3 rounded" style="background-color:#f0edf6; border:1px dashed #c4b5d9;">
                <p class="text-center small fw-semibold mb-2" style="color:var(--brand)">
                    <i class="fa-solid fa-circle-info me-1"></i>Credenciales de prueba
                </p>
                <div class="row g-2 text-center" style="font-size:.78rem;">
                    <div class="col-6">
                        <span class="badge bg-warning text-dark mb-1" style="font-size:.6rem;">ADMIN</span><br>
                        <code>admin@unicornt.cl</code><br>
                        <code>admin123</code>
                    </div>
                    <div class="col-6">
                        <span class="badge bg-success mb-1" style="font-size:.6rem;">CLIENTE</span><br>
                        <code>cliente@unicornt.cl</code><br>
                        <code>cliente123</code>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-JC1viRkYb8yczsDnJCGMEsObeX0RLUQHGnGhO3O0qM20E9XMOv3jLRGfSBkUL1FT"
        crossorigin="anonymous"></script>
</body>
</html>
