<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta &mdash; Unicorn't Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unicornt-store.keber.cl/assets/css/main.css">
    <link rel="stylesheet" th:href="@{/assets/css/admin.css}">
</head>

<body class="d-flex align-items-center" style="min-height:100vh; background-color:#faf9ff;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-5 col-lg-4">

            <!-- Branding -->
            <div class="text-center mb-4">
                <i class="fa-solid fa-unicorn fs-1" style="color:var(--brand)"></i>
                <h3 class="fw-bold mt-2" style="color:var(--text-dark)">Unicorn't Store</h3>
                <p class="text-muted small">Crea tu cuenta para comenzar</p>
            </div>

            <!-- Card -->
            <div class="admin-form-card p-4">

                <!-- Error -->
                <div th:if="${error}" class="alert alert-danger py-2 small" role="alert">
                    <i class="fa-solid fa-circle-exclamation me-1"></i>
                    <span th:text="${error}"></span>
                </div>

                <!-- Form -->
                <form th:action="@{/register}" th:object="${registerRequest}" method="post">

                    <div class="mb-3">
                        <label for="firstName" class="form-label small fw-semibold">Nombre</label>
                        <input type="text" id="firstName" th:field="*{firstName}"
                               class="form-control" placeholder="Ingresa tu nombre" required>
                    </div>

                    <div class="mb-3">
                        <label for="lastName" class="form-label small fw-semibold">Apellido</label>
                        <input type="text" id="lastName" th:field="*{lastName}"
                               class="form-control" placeholder="Ingresa tu apellido" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label small fw-semibold">Correo electrónico</label>
                        <input type="email" id="email" th:field="*{email}"
                               class="form-control" placeholder="tu@correo.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label small fw-semibold">Contraseña</label>
                        <input type="password" id="password" th:field="*{password}"
                               class="form-control" placeholder="Mínimo 6 caracteres" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-semibold">
                        <i class="fa-solid fa-user-plus me-1"></i>Crear cuenta
                    </button>
                </form>

                <hr class="my-3">

                <p class="text-center small mb-0">
                    ¿Ya tienes cuenta?
                    <a th:href="@{/login}" class="fw-semibold">Iniciar sesión</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-JC1viRkYb8yczsDnJCGMEsObeX0RLUQHGnGhO3O0qM20E9XMOv3jLRGfSBkUL1FT"
        crossorigin="anonymous"></script>
</body>
</html>
