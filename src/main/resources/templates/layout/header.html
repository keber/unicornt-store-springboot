<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<!--
  Fragmentos de cabecera reutilizables.

  Uso en cada template de contenido:
    <head th:replace="~{layout/header :: head}"></head>
    <header th:replace="~{layout/header :: navbar}"></header>
-->

<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin &mdash; Unicorn't Store</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Hoja principal compartida con el storefront público -->
    <link rel="stylesheet" href="https://unicornt-store.keber.cl/assets/css/main.css">
    <!-- Estilos complementarios del panel de administración -->
    <link rel="stylesheet" th:href="@{/assets/css/admin.css}">
</head>

<body>

<!-- ===== NAVBAR ===== -->
<header th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-brand sticky-top shadow-sm">
        <div class="container">
            <!-- Logo + badge ADMIN -->
            <a class="navbar-brand d-flex align-items-center gap-2"
               th:href="@{/admin/products}">
                <i class="fa-solid fa-unicorn fs-4"></i>
                <span class="fw-bold">Unicorn't Store</span>
                <span class="badge bg-warning text-dark fw-semibold" style="font-size:.6rem;letter-spacing:.05em">ADMIN</span>
            </a>

            <!-- Hamburger -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navAdmin"
                    aria-controls="navAdmin" aria-expanded="false" aria-label="Abrir menú">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Nav links -->
            <div class="collapse navbar-collapse" id="navAdmin">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/products}">
                            <i class="fa-solid fa-tshirt me-1"></i>Productos
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

</body>
</html>
